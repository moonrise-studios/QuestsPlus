name: Publish Modrinth

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version_number:
        description: Version number to publish.
        required: true
      version_type:
        description: Modrinth release type.
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      game_versions:
        description: Comma-separated Minecraft versions.
        required: true
        default: "1.21.8"
      loaders:
        description: Comma-separated Modrinth loaders.
        required: true
        default: paper
      changelog:
        description: Release changelog.
        required: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
      MODRINTH_PROJECT_ID: ${{ vars.MODRINTH_PROJECT_ID || 'questsplus' }}
      MODRINTH_VERSION_NUMBER: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.version_number }}
      MODRINTH_VERSION_NAME: ${{ github.event_name == 'release' && github.event.release.name || format('QuestsPlus {0}', inputs.version_number) }}
      MODRINTH_VERSION_TYPE: ${{ github.event_name == 'release' && 'release' || inputs.version_type }}
      MODRINTH_GAME_VERSIONS: ${{ inputs.game_versions || vars.MODRINTH_GAME_VERSIONS || '1.21.8' }}
      MODRINTH_LOADERS: ${{ inputs.loaders || vars.MODRINTH_LOADERS || 'paper' }}
      MODRINTH_CHANGELOG: ${{ github.event_name == 'release' && github.event.release.body || inputs.changelog || 'Automated release.' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Validate Modrinth token
        run: |
          if [ -z "${MODRINTH_TOKEN}" ]; then
            echo "MODRINTH_TOKEN repository secret is required." >&2
            exit 1
          fi

      - name: Run tests
        run: ./gradlew :sdk:test :plugin:test

      - name: Publish to Modrinth
        run: ./gradlew :plugin:modrinth
