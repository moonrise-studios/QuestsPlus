name: Deploy Quests SDK to Moonrise Nexus (Gradle)

on:
  push:
    branches:
      - '**'
  release:
    types:
      - published

jobs:
  deploy_sdk:
    if: github.event_name == 'push' || github.event.release.target_commitish == 'main'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Configure Gradle / Nexus credentials
        run: |
          mkdir -p ~/.gradle
          cat << 'EOF' > ~/.gradle/gradle.properties
          nexusUsername=${{ secrets.NEXUS_USERNAME }}
          nexusPassword=${{ secrets.NEXUS_PASSWORD }}
          nexusSnapshotsUrl=https://repo.moonrise.gg/repository/maven-snapshots
          nexusReleasesUrl=https://repo.moonrise.gg/repository/maven-releases
          EOF

      - name: Modify SDK version for release
        if: github.event_name == 'release'
        run: |
          sed -i "s/\\(var apiVersion = \\\"[^\\\"]*\\)-SNAPSHOT\\\"/\\1\\\"/" sdk/build.gradle.kts

      - name: Modify SDK version for snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          sed -i "/var apiVersion = \\\".*-SNAPSHOT\\\"/! s/\\(var apiVersion = \\\"[^\\\"]*\\)\\\"/\\1-SNAPSHOT\\\"/" sdk/build.gradle.kts

      - name: Modify SDK version for experimental
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          short_sha="${GITHUB_SHA::7}"
          sed -i "s/\\(var apiVersion = \\\"[^\\\"]*\\)-SNAPSHOT\\\"/\\1\\\"/" sdk/build.gradle.kts
          sed -i "s/\\(var apiVersion = \\\"[^\\\"]*\\)\\\"/\\1-${short_sha}\\\"/" sdk/build.gradle.kts

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build and deploy SDK release
        if: github.event_name == 'release'
        run: ./gradlew clean :sdk:publish -PisRelease=true

      - name: Build and deploy SDK snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: ./gradlew clean :sdk:publish -PisRelease=false

      - name: Build and deploy SDK experimental
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: ./gradlew clean :sdk:publish -PisRelease=false -PnexusSnapshotsUrl=https://repo.moonrise.gg/repository/experimental
